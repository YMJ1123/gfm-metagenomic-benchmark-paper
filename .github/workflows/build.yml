name: build-manuscript
on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

# NOTE: texlive_version is pinned to 2024. The OUP oup-authoring-template
# class depends on arydshln, which is broken by the TeX Live 2026 ("latest")
# LaTeX kernel — even OUP's own sample fails to compile there. TeX Live 2024
# compiles the class (and this manuscript) cleanly, and matches what Overleaf
# uses for OUP submissions. Do not bump to "latest" until the class is fixed.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile main manuscript (pdflatex + bibtex)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          texlive_version: 2024
          latexmk_use_xelatex: false

      - name: Compile supplementary
        uses: xu-cheng/latex-action@v3
        with:
          root_file: supplementary.tex
          texlive_version: 2024

      - name: Compile cover letter
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cover_letter.tex
          texlive_version: 2024

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: manuscript-pdfs
          path: |
            main.pdf
            supplementary.pdf
            cover_letter.pdf
          if-no-files-found: error
